summary = "TikTok Live Reader"
description = """TikTok Live Reader позволява проследяването на лайфове в TikTok в реално време. Добавката извлича коментари, гифтове, нови последователи, харесвания, споделяния и статистика за зрителите, като ги записва в текстови файлове. Те могат да бъдат четени с клавишни комбинации по време на сесията. Поддържат се също звукови сигнали и автоматично изговаряне за различните събития."""